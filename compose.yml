services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: running_analytics_db
      POSTGRES_USER: running_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5433:5432"
    volumes:
      - running_postgres_data:/var/lib/postgresql/data
      # Runs once on first init of an empty data volume; re-apply any time
      # with `make bootstrap` (the script is idempotent).
      - ./sql/bootstrap.sql:/docker-entrypoint-initdb.d/bootstrap.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U running_user -d running_analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  running_postgres_data:
