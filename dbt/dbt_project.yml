# dbt project (decision D4: lives in dbt/, never the repo root; all dbt
# commands are wrapped in Makefile targets so path handling never leaks
# into the daily workflow).

name: running_analytics
version: "1.0.0"
profile: running_analytics

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
seed-paths: ["seeds"]

target-path: target
clean-targets: [target, dbt_packages]

# Metric thresholds (decisions D9, D12, D13 + the agreed 45-minute
# long-run rule). Overridable with --vars, never hardcoded in model SQL.
vars:
  easy_hr_max: 152
  easy_min_moving_minutes: 30
  easy_pace_min_per_mi_floor: 4.0
  easy_pace_min_per_mi_ceiling: 20.0
  hr_sanity_floor: 90
  hr_sanity_ceiling: 200
  long_run_min_moving_minutes: 45
  min_weekly_qualifying_runs: 2
  trend_window_days: 28
  # Drift analysis window (D16) and the two checks D16 left
  # unquantified, settled as: coverage = average sample spacing within
  # the window <= 3 s; excessive pauses = non-moving share > 25%.
  drift_warmup_minutes: 10
  drift_cooldown_minutes: 5
  drift_min_window_minutes: 30
  drift_max_avg_sample_gap_s: 3
  drift_max_paused_fraction: 0.25

# Layers map onto the five locked schemas (D3). generate_schema_name is
# overridden so these names are used exactly, without dbt's default
# <target>_<schema> prefixing.
models:
  running_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    core:
      +materialized: table
      +schema: analytics
    marts:
      +materialized: table
      +schema: analytics
