# dbt project (decision D4: lives in dbt/, never the repo root; all dbt
# commands are wrapped in Makefile targets so path handling never leaks
# into the daily workflow).

name: running_analytics
version: "1.0.0"
profile: running_analytics

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
seed-paths: ["seeds"]

target-path: target
clean-targets: [target, dbt_packages]

# Metric thresholds (decision D9 + the agreed 45-minute long-run rule).
# Overridable with --vars, never hardcoded in model SQL.
vars:
  easy_hr_max: 152
  easy_min_moving_minutes: 30
  easy_pace_min_per_mi_floor: 4.0
  easy_pace_min_per_mi_ceiling: 20.0
  hr_sanity_floor: 90
  hr_sanity_ceiling: 200
  long_run_min_moving_minutes: 45

# Layers map onto the five locked schemas (D3). generate_schema_name is
# overridden so these names are used exactly, without dbt's default
# <target>_<schema> prefixing.
models:
  running_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    core:
      +materialized: table
      +schema: analytics
