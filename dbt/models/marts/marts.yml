version: 2

models:
  - name: mart_weekly_training
    description: >
      One row per training week (Monday-start, local wall-clock, from
      fct_runs.week_start_date). Volume covers ALL runs; efficiency
      statistics cover runs with VALID heart-rate data (D9 revised
      v1.1 — intensity mix is displayed, not filtered), with median
      primary and mean secondary (D11). Weeks with zero valid runs keep
      NULL efficiency — never zero. is_sufficient (D12) marks weeks with
      enough valid runs to be trend-worthy; the dashboard must show
      sample counts alongside every efficiency figure.
    columns:
      - name: week_start_date
        description: Monday of the local training week (grain).
        tests: [unique, not_null]
      - name: run_count
        description: All running activities that week.
        tests: [not_null]
      - name: valid_run_count
        description: Runs passing the D9 (revised v1.1) validity rules.
        tests: [not_null]
      - name: long_run_count
        description: Runs with moving time >= the 45-minute long-run threshold.
      - name: total_distance_mi
        description: Weekly mileage across all runs (mi, 1 dp).
      - name: total_moving_time_min
        description: Weekly moving time across all runs (min).
      - name: total_elevation_gain_m
        description: Weekly elevation gain across all runs (m).
      - name: median_efficiency_m_per_beat
        description: >
          PRIMARY weekly statistic (D11): median D10 efficiency across
          valid runs; NULL when none are valid.
      - name: mean_efficiency_m_per_beat
        description: Secondary statistic; same population as the median.
      - name: avg_hr_bpm
        description: >
          Average HR across the week's valid runs — intensity context,
          since the aggregates no longer filter on effort (v1.1).
      - name: avg_temperature_f
        description: Average matched temperature across valid runs (°F); NULL when unmatched.
      - name: avg_relative_humidity_pct
        description: Average matched humidity across valid runs; NULL when unmatched.
      - name: valid_runs_with_weather
        description: How many valid runs had weather within 60 min — the sample behind the averages.
      - name: is_sufficient
        description: valid_run_count >= min_weekly_valid_runs (D12, default 2).
        tests: [not_null]

  - name: mart_efficiency_trend
    description: >
      One row per training week: the weekly median efficiency next to
      its 28-day rolling median (D13) and the week's temperature-band
      context (D14, joined from the temperature_bands seed — the bands
      are never restated in SQL). The rolling median smooths single-week
      noise; insufficient weeks (D12) stay present and flagged so the
      dashboard can de-emphasize rather than hide them. Approved
      framing: pace-at-heart-rate efficiency observed under similar
      conditions — never proof of fitness change.
    columns:
      - name: week_start_date
        description: Monday of the local training week (grain).
        tests: [unique, not_null]
      - name: valid_run_count
        description: Valid runs in the week itself.
        tests: [not_null]
      - name: median_efficiency_m_per_beat
        description: The week's own median (from mart_weekly_training).
      - name: rolling_median_efficiency
        description: >
          Median across all valid runs in the trailing trend_window_days
          window (dbt var, default 28 — D13) ending with the week's
          Sunday; NULL when that window holds none.
      - name: rolling_valid_run_count
        description: >
          Sample size behind the rolling median (valid runs in the
          trend_window_days window).
        tests: [not_null]
      - name: avg_hr_bpm
        description: >
          Average HR across the week's valid runs (from
          mart_weekly_training) — intensity context for the trend.
      - name: avg_temperature_f
        description: The week's average valid-run temperature (°F).
      - name: temperature_band_key
        description: >
          D14 band of avg_temperature_f (cold/mild/warm); NULL when the
          week has no weather-matched valid runs — missing context
          stays missing, never a default band.
      - name: temperature_band_label
        description: Display label of the band.
      - name: is_sufficient
        description: D12 sufficiency carried from mart_weekly_training.
        tests: [not_null]

  - name: mart_efficiency_by_temp_band
    description: >
      One row per D14 temperature band per period (v1 ships 'all_time'
      only; the period column exists so finer grains can be added
      without breaking consumers). All three seed bands always appear —
      an empty band has count 0 and NULL statistics, distinguishable
      from a low-efficiency band. Two explicit pseudo-band rows keep
      "not applicable" distinct from "missing": 'indoor' carries
      valid treadmill runs (no outdoor weather applies), and
      'weather unavailable' carries outdoor valid runs that
      matched no observation — so the band comparison can never
      silently overstate its coverage. Population: runs with valid
      heart-rate data, banded by matched temperature_f against the
      seed bounds.
    columns:
      - name: period
        description: Aggregation period; 'all_time' in v1.
        tests:
          - not_null
          - accepted_values:
              arguments: {values: ['all_time']}
      - name: band_key
        description: >
          cold / mild / warm (from the seed) or the explicit
          pseudo-bands: indoor (weather not applicable) and no_weather
          (weather missing for an outdoor run).
        tests:
          - unique
          - not_null
          - accepted_values:
              arguments: {values: [cold, mild, warm, indoor, no_weather]}
      - name: band_label
        description: Display label (D14 wording, 'indoor', or 'weather unavailable').
        tests: [not_null]
      - name: valid_run_count
        description: Sample size — the dashboard must show it with every comparison.
        tests: [not_null]
      - name: median_efficiency_m_per_beat
        description: Median D10 efficiency in the band; NULL when the band is empty.
      - name: mean_efficiency_m_per_beat
        description: Mean D10 efficiency in the band (secondary, per D11).
      - name: avg_temperature_f
        description: Average matched temperature in the band; NULL for the no_weather row.
      - name: avg_pace_min_per_mi
        description: Average pace context for the band.
      - name: avg_hr_bpm
        description: Average HR context for the band.

  - name: mart_run_quality
    description: >
      One row per running activity — the consumer-facing quality view
      the dashboard's eligibility table reads. Carries the run's
      efficiency value (computed for EVERY heart-rate-carrying run),
      the D9 (revised v1.1) validity verdict with its data-validity
      exclusion reason, weather context with a per-run temperature-band
      label (indoor / D14 band / weather unavailable), drift context
      (decoupling or the D16 exclusion reason) when the run is a drift
      candidate, and the D22 HR-band exclusion reason when the run is a
      band candidate. Exists so "why didn't run X count?" is answerable
      from the analytics schema alone (D19 marts-only).
    columns:
      - name: activity_id
        description: Strava activity id (grain of the mart).
        tests: [unique, not_null]
      - name: aerobic_efficiency_m_per_heartbeat
        description: >
          D10 metric for this run regardless of validity; NULL only
          when HR is absent. Trend/band marts aggregate valid runs
          only — this column shows every run's value anyway.
      - name: is_valid
        description: >
          D9 (revised v1.1) validity verdict — what the aggregates
          count.
        tests: [not_null]
      - name: exclusion_reason
        description: First failing validity rule; NULL when valid.
      - name: temperature_band_label
        description: >
          Per-run band: 'indoor' (trainer; weather not applicable), a
          D14 seed band label, or 'weather unavailable' (outdoor with
          no matched temperature).
        tests: [not_null]
      - name: decoupling_pct
        description: Drift result when analyzed; NULL for non-candidates.
      - name: drift_exclusion_reason
        description: First failing D16 check for unanalyzed candidates.
      - name: band_exclusion_reason
        description: >
          First failing D22 check for unanalyzed band candidates (v1.4,
          the same route drift reasons take). NULL when the run is not
          a band candidate OR was analyzed successfully —
          fct_band_candidates distinguishes the two.

  - name: mart_run_drift
    description: >
      One row per successfully analyzed drift run: decoupling percentage
      with per-half detail, duration/distance/temperature context, and
      the data-quality numbers behind the value (sample counts, paused
      fraction, average sample gap). Excluded candidates are NOT here —
      their deterministic reasons surface in mart_run_quality, which
      the dashboard's eligibility table reads. D17 sign convention:
      positive = efficiency declined in the second half.
    columns:
      - name: activity_id
        description: Strava activity id (one row per analyzed run).
        tests: [unique, not_null]
      - name: decoupling_pct
        description: >
          (first-half efficiency − second-half efficiency) / first-half
          efficiency × 100. Positive = second-half decline (D17).
        tests:
          - not_null
          - accepted_range:
              arguments: {min_value: -100, max_value: 100}
      - name: analysis_window_min
        description: Trimmed D16 analysis window length, minutes.
      - name: temperature_f
        description: Matched run-start temperature; NULL when unmatched.
      - name: weather_available
        description: Whether weather context exists for this run.
        tests: [not_null]

  - name: mart_drift_trend
    description: >
      One row per training week with any analyzed drift run: median
      decoupling, the 28-day rolling median, sample counts, and average
      duration/temperature context. is_sufficient applies the D12
      threshold; the dashboard hides insufficient trend points
      (acceptance criterion 7) while the rows remain queryable here.
    columns:
      - name: week_start_date
        description: Monday of the local training week (grain).
        tests: [unique, not_null]
      - name: drift_run_count
        description: Analyzed drift runs in the week.
        tests: [not_null]
      - name: median_decoupling_pct
        description: The week's median decoupling (D17 sign convention).
      - name: rolling_median_decoupling_pct
        description: >
          Median across analyzed runs in the trailing trend_window_days
          window (dbt var, default 28 — D13 pattern).
      - name: rolling_drift_run_count
        description: >
          Sample size behind the rolling median (analyzed runs in the
          trend_window_days window).
        tests: [not_null]
      - name: is_sufficient
        description: drift_run_count >= min_weekly_valid_runs (D12).
        tests: [not_null]

  - name: mart_band_weekly
    description: >
      One row per training week and HR band with any contributing run
      (D22, v1.4): the weekly median pace at that band — the MEDIAN
      ACROSS CONTRIBUTING RUNS of the run-level band medians (D11's
      median-of-runs philosophy: one long run must not dominate a week
      by sample count) — with the contributing-run count, average
      temperature context, and the D12 sufficiency flag at this grain.
      Deliberately NOT on the app's allow-list: the weekly columns
      travel inside mart_band_trend, per the trend-mart interface.
    columns:
      - name: week_start_date
        description: >
          Monday of the local training week (composite grain with
          band_key — assert_band_weekly_unique_per_week_band).
        tests: [not_null]
      - name: band_key
        description: hr_bands seed key.
        tests: [not_null]
      - name: band_label
        description: Display label from the hr_bands seed.
        tests: [not_null]
      - name: band_sort_order
        description: Low-to-high HR display order from the seed.
        tests: [not_null]
      - name: contributing_run_count
        description: Runs with a qualifying segment in this week x band.
        tests: [not_null]
      - name: median_velocity_m_per_s
        description: >
          Median across contributing runs of the run-level band median
          velocity (medians live in velocity space end to end).
        tests: [not_null]
      - name: median_pace_min_per_mi
        description: The weekly median as pace (derived from velocity).
        tests: [not_null]
      - name: avg_temperature_f
        description: >
          Average matched temperature of the contributing runs; NULL
          when none carries weather. Context only (dry-bulb).
      - name: is_sufficient
        description: contributing_run_count >= min_weekly_valid_runs (D12).
        tests: [not_null]

  - name: mart_band_trend
    description: >
      One row per training week and HR band — the D22 mart the
      dashboard reads (the Aerobic Efficiency view's band section; the
      allow-list grows by exactly this name). Weekly columns ride in
      from mart_band_weekly (the sanctioned one-hop mart-to-mart edge);
      the rolling median is computed per band across run-level band
      medians in the trailing trend_window_days window (D13 pattern),
      with STATIC column names per v1.3 — the var changes the window,
      never the interface. Sign of interest, observational never
      causal: RISING pace (falling min/mi) at the same HR band signals
      an improving aerobic base. The dashboard connects trend lines
      through sufficient weeks only and shows insufficient week x band
      points de-emphasized rather than hidden; the rows remain
      queryable here.
    columns:
      - name: week_start_date
        description: >
          Monday of the local training week (composite grain with
          band_key).
        tests: [not_null]
      - name: band_key
        description: hr_bands seed key.
        tests: [not_null]
      - name: band_label
        description: Display label from the hr_bands seed.
        tests: [not_null]
      - name: contributing_run_count
        description: Runs behind the weekly statistic.
        tests: [not_null]
      - name: median_pace_min_per_mi
        description: The week's median band pace (from mart_band_weekly).
        tests: [not_null]
      - name: rolling_median_velocity_m_per_s
        description: >
          Median across run-level band medians in the trailing
          trend_window_days window (dbt var, default 28 — D13 pattern),
          velocity space.
      - name: rolling_median_pace_min_per_mi
        description: The rolling median as pace (derived from velocity).
      - name: rolling_band_run_count
        description: Sample size behind the rolling median.
        tests: [not_null]
      - name: is_sufficient
        description: >
          The weekly D12 flag carried through from mart_band_weekly.
        tests: [not_null]

  - name: mart_run_band_segments
    description: >
      One row per analyzed run per HR band (v1.6) — the scatter the
      dashboard's band chart reads: the run's band median pace with its
      date, training week, and minutes of dwell. Explicit-column
      projection of core fct_run_band_segments joined to the hr_bands
      seed for display columns; no filters beyond core's analyzed-only
      and dwell-minimum rules. median_velocity_m_per_s rides along for
      the v1.6 consistency contract
      (assert_band_weekly_matches_segment_mart); pace is the display
      unit, as everywhere else.
    columns:
      - name: activity_id
        description: >
          Strava activity (composite grain with band_key —
          assert_band_segments_mart_unique_per_run_band).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_runs')
                field: activity_id
      - name: start_date_local
        description: The run's local start time (the scatter x position).
        tests: [not_null]
      - name: week_start_date
        description: Monday of the local training week.
        tests: [not_null]
      - name: band_key
        description: hr_bands seed key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hr_bands')
                field: band_key
      - name: band_label
        description: Display label from the hr_bands seed.
        tests: [not_null]
      - name: band_sort_order
        description: Low-to-high HR display order from the seed.
        tests: [not_null]
      - name: median_velocity_m_per_s
        description: >
          The run's median velocity in this band (from core, 3 dp) —
          the consistency-contract column; medians live in velocity
          space end to end.
        tests: [not_null]
      - name: median_pace_min_per_mi
        description: The run's band median as pace (display unit).
        tests: [not_null]
      - name: dwell_min
        description: >
          Capped dwell in this band in minutes (core enforces the
          5-minute D22 floor in seconds).
        tests: [not_null]
