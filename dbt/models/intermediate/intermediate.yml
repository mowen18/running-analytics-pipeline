version: 2

models:
  - name: int_runs_with_weather
    description: >
      One row per running activity (Run/TrailRun/VirtualRun — same
      grain fct_runs inherits), joined to the NEAREST qualifying hourly
      observation at the run's normalized D7 cell. Qualifying means the
      observation carries at least one measurement; the explicit
      all-NULL "archive had no data" rows never match. The model records
      the match time-difference and flags weather_matched only within
      60 minutes of the start — beyond that the observation no longer
      describes the run's start conditions. Indoor and coordinate-less
      runs remain in the grain, permanently unmatched, with NULL weather
      — missing stays distinguishable from zero.
    columns:
      - name: activity_id
        description: Strava activity id (one row per running activity).
        tests: [unique, not_null]
      - name: location_key
        description: >
          The run's normalized ~1.1 km cell (D7), derived in SQL to
          mirror ingestion's Python formatting; NULL when the run has no
          GPS coordinates.
      - name: weather_timestamp
        description: UTC hour of the nearest qualifying observation; NULL when none exists.
      - name: weather_match_minutes
        description: >
          Minutes between the run start and the matched observation
          hour; NULL when no observation exists at the cell.
        tests:
          - accepted_range:
              arguments: {min_value: 0}
      - name: weather_matched
        description: True only when a qualifying observation lies within 60 minutes.
        tests: [not_null]

  - name: int_run_efficiency
    description: >
      One row per running activity — the run-level computation layer
      (Revision v1.2): the derived training measures (pace, speed,
      distance, calendar fields, the duration-based long-run flag —
      previously computed in fct_runs), the D10 aerobic-efficiency
      metric, and the run's validity verdict (D9 revised v1.1:
      data-validity rules only — no intensity ceiling, no race/workout
      exclusion). is_valid is DEFINED as (exclusion_reason is null);
      the exclusion ladder is the single encoding of the rules. Invalid
      runs are NEVER silently filtered: each carries a human-readable
      exclusion_reason (the FIRST failing rule in priority order: data
      availability, HR sanity, pace bounds, minimum duration). Feeds
      fct_runs, which projects this model into core for the marts.
      Efficiency is an observational signal, not proof of physiological
      improvement — approved framing lives in the README's metric
      definitions.
    columns:
      - name: activity_id
        description: Strava activity id (one row per running activity).
        tests: [unique, not_null]
      - name: aerobic_efficiency_m_per_heartbeat
        description: >
          speed_m_per_min / average_hr_bpm (D10) — approximate meters
          traveled per heartbeat; higher = faster at the same HR or
          lower HR at the same speed. Computed for any run with HR and
          speed (races included); is_valid decides what the marts
          aggregate. NULL when HR is absent — missing, never zero.
        tests:
          - accepted_range:
              arguments: {min_value: 0.1, max_value: 10}
      - name: is_valid
        description: >
          The run carries valid HR data and counts toward every
          efficiency aggregate (D9 revised v1.1: HR present, HR within
          the sanity band, pace within bounds, moving time at least the
          minimum — thresholds as dbt vars).
        tests: [not_null]
      - name: exclusion_reason
        description: >
          NULL when valid; otherwise the first failing validity rule.
          Threshold values are rendered from the same dbt vars the flag
          logic uses, so reasons can never disagree with behavior.
        tests:
          - accepted_values:
              arguments:
                values:
                  - 'no heart rate data'
                  - 'average HR outside 90–200 bpm sanity band'
                  - 'pace outside 4.0–20.0 min/mi bounds'
                  - 'moving time under 15 minutes'

  - name: int_run_stream_samples
    description: >
      One row per successfully loaded activity and aligned sample index:
      the raw parallel stream arrays (time / heartrate / velocity_smooth
      / moving / grade_smooth) unnested by shared index, so downstream
      SQL reads samples relationally. is_valid_sample marks
      instrument-sane samples (HR 25–250 bpm as in staging, velocity
      0–12 m/s); invalid samples are excluded from drift halves and
      heavy invalidity surfaces as a coverage failure, never as
      poisoned averages.
    columns:
      - name: activity_id
        description: Strava activity id (streams stored successfully).
        tests: [not_null]
      - name: sample_index
        description: Zero-based position in the aligned arrays.
        tests: [not_null]
      - name: elapsed_s
        description: Seconds since activity start (the time stream).
        tests:
          - not_null
          - accepted_range:
              arguments: {min_value: 0}
      - name: hr_bpm
        description: Instantaneous heart rate; NULL when the sample carries none.
      - name: velocity_m_per_s
        description: Smoothed velocity; NULL when the sample carries none.
      - name: is_moving
        description: Strava's moving flag; false also when the sample omits it.
        tests: [not_null]
      - name: grade_pct
        description: Smoothed grade; context only, not used in drift math.
      - name: is_valid_sample
        description: HR and velocity both present and instrument-sane.
        tests: [not_null]

