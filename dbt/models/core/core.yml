version: 2

models:
  - name: fct_runs
    description: >
      One row per Strava running activity (Run/TrailRun/VirtualRun),
      indoor and outdoor alike — the mart- and app-facing core contract
      (Revision v1.2): an explicit-column projection of
      int_run_efficiency carrying the derived training measures, weather
      context, the duration-based long-run flag, and the analytic
      columns (aerobic efficiency, is_valid, exclusion_reason) computed
      upstream, so marts read core only. Missing heart rate and missing
      weather remain NULL end to end — distinguishable from zero.
    columns:
      - name: activity_id
        description: Strava activity id (grain of the table).
        tests: [unique, not_null]
      - name: week_start_date
        description: >
          Monday of the run's local training week (derived from
          start_date_local — a 9 PM Tuesday run belongs to Tuesday even
          when it is already Wednesday in UTC).
        tests: [not_null]
      - name: start_month
        description: Calendar month (1-12) of the local start time.
      - name: start_year
        description: Calendar year of the local start time.
      - name: distance_mi
        description: Distance in miles (meters / 1609.344, 2 dp).
      - name: moving_time_min
        description: Moving time in minutes (1 dp).
      - name: pace_min_per_mi
        description: >
          Pace in minutes per mile; NULL when distance or moving time is
          zero (guarded division, never an error).
        tests:
          - accepted_range:
              arguments: {min_value: 0}
      - name: speed_m_per_min
        description: Speed in meters per minute; NULL when moving time is zero.
        tests:
          - accepted_range:
              arguments: {min_value: 0}
      - name: elevation_gain_m_per_mi
        description: Elevation gain per mile (m/mi); NULL when distance is zero.
      - name: average_hr_bpm
        description: Average heart rate (bpm); NULL when the source has no HR.
      - name: weather_available
        description: >
          True when a qualifying observation within 60 minutes exists at
          the run's D7 cell (int_runs_with_weather.weather_matched).
        tests: [not_null]
      - name: weather_match_minutes
        description: Minutes between run start and the matched observation.
      - name: temperature_c
        description: Matched observation air temperature, °C; NULL when unmatched.
      - name: long_run_eligible
        description: >
          Moving time >= long_run_min_moving_minutes (45, aligned with
          D15's stream threshold so "long run" keeps one meaning in
          Phase 5). Deliberately duration-based, not Strava's manual
          workout_type = 2 tag.
        tests: [not_null]
      - name: fetched_at
        description: Ingestion timestamp carried from the raw layer.
        tests: [not_null]
      - name: aerobic_efficiency_m_per_heartbeat
        description: >
          D10 efficiency (meters per heartbeat), computed in
          int_run_efficiency and projected here unchanged; the
          accepted_range test lives at the computation site.
      - name: is_valid
        description: >
          The run counts toward every efficiency aggregate (D9 revised
          v1.1). Defined upstream as (exclusion_reason is null).
        tests: [not_null]
      - name: exclusion_reason
        description: >
          NULL when valid; otherwise the first failing validity rule.
          The accepted_values test lives at the computation site
          (int_run_efficiency) so the var-rendered strings are
          maintained in one file.

  - name: fct_drift_candidates
    description: >
      One row per drift CANDIDATE (HR-carrying run >= the 45-minute
      long-run threshold, D15 revised v1.1 — intensity is not a
      prerequisite), materialized in core since Revision v1.2 (formerly
      intermediate.int_run_drift_halves): the D16 analysis window
      applied in the plan's order (drop non-moving samples, trim the
      first 10 and last 5 minutes, require >= 30 minutes remaining,
      split into two equal-duration halves), per-half
      HR/speed/efficiency, and the decoupling percentage. Candidates
      that cannot be analyzed carry the FIRST failing check as a
      deterministic exclusion_reason, in dependency order: stream
      availability -> required arrays -> window length -> pauses ->
      coverage. D17 sign convention: POSITIVE decoupling = efficiency
      declined in the second half; near zero = stable; negative = the
      second half improved.
    columns:
      - name: activity_id
        description: >
          Strava activity id (one row per drift candidate). Every
          candidate must exist in fct_runs — mart_run_drift inner-joins
          run context on this id, so the relationship is a tested
          contract, not just a structural accident of both models
          descending from int_run_efficiency.
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('fct_runs')
                field: activity_id
      - name: window_duration_s
        description: Analysis-window length after trimming; NULL when streams are absent.
      - name: paused_fraction
        description: Non-moving share of window samples (pause check input).
      - name: avg_sample_gap_s
        description: window_duration_s / valid samples (coverage check input).
      - name: first_half_efficiency
        description: first_half_speed_m_per_min / first_half_hr_bpm (D16).
      - name: second_half_efficiency
        description: second_half_speed_m_per_min / second_half_hr_bpm (D16).
      - name: decoupling_pct
        description: >
          (first_half_efficiency - second_half_efficiency) /
          first_half_efficiency * 100 (D17: positive = second-half
          decline). NULL exactly when exclusion_reason is set.
      - name: exclusion_reason
        description: >
          NULL when the run was analyzed; otherwise the first failing
          D16 check, with thresholds rendered from the same dbt vars
          the checks use.

  - name: fct_band_candidates
    description: >
      One row per D22 pace-at-HR-band CANDIDATE — an HR-carrying run at
      or past the stream FETCH gate (stream_fetch_min_moving_minutes,
      D15 revised v1.4; drift candidacy keeps the 45-minute var and
      stays a strict subset by construction). An explicit-column core
      projection of int_run_band_assessment, where the exclusion ladder
      is encoded once, in dependency order: stream availability ->
      required arrays -> window length (pooled moving dwell after the
      5/2-minute trims) -> sample coverage -> dwell minimum. Every
      candidate carries exactly one of (>= 1 row in
      fct_run_band_segments, exclusion_reason) — the
      assert_band_candidates_exclusive_exhaustive contract.
    columns:
      - name: activity_id
        description: >
          Strava activity id (one row per band candidate). Every
          candidate must exist in fct_runs — the relationship is a
          tested contract (proven red on an injected orphan first, the
          v1.3 discipline), not a structural accident of both models
          descending from int_run_efficiency.
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('fct_runs')
                field: activity_id
      - name: window_duration_s
        description: >
          Elapsed span of the band analysis window after the
          warm-up/cool-down trims; NULL when streams are absent.
      - name: avg_sample_gap_s
        description: >
          window_duration_s / valid samples in the window (moving or
          not) — the coverage-check input, the same mechanism drift
          uses with the same drift_max_avg_sample_gap_s cap.
      - name: pooled_moving_dwell_min
        description: >
          Minutes of pooled moving material behind the run's band
          medians (sum of capped per-sample dwell): the "window length"
          the ladder tests against band_min_window_minutes.
      - name: qualifying_band_count
        description: >
          HR bands where this run's dwell reaches
          band_min_dwell_minutes; 0 exactly when the final ladder rung
          fires.
      - name: exclusion_reason
        description: >
          NULL when the run was analyzed (it then owns >= 1 band
          segment); otherwise the first failing D22 check, thresholds
          rendered from the same dbt vars the checks use.

  - name: fct_run_band_segments
    description: >
      One row per analyzed run and HR band with dwell of at least
      band_min_dwell_minutes (D22) — transitions passing through a band
      never deposit junk medians. Medians are computed in VELOCITY
      space over the pooled (valid + moving + trimmed-window) samples;
      pace is derived from the median velocity for display. Excluded
      candidates have NO rows here; their reasons live in
      fct_band_candidates and reach the dashboard as
      mart_run_quality.band_exclusion_reason.
    columns:
      - name: activity_id
        description: >
          Strava activity id. Composite grain with band_key
          (assert_band_segments_unique_per_run_band); every row's run
          must be a band candidate.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_band_candidates')
                field: activity_id
      - name: band_key
        description: hr_bands seed key (10-bpm bands, open-ended edges).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('hr_bands')
                field: band_key
      - name: dwell_s
        description: >
          Seconds of capped per-sample dwell this run spent in the band
          within the analysis window; at least band_min_dwell_minutes
          by construction (assert_band_segments_meet_dwell_minimum).
        tests: [not_null]
      - name: sample_count
        description: Pooled samples behind the band medians.
        tests: [not_null]
      - name: median_velocity_m_per_s
        description: Median pooled velocity in the band (the base measure).
        tests:
          - not_null
          - accepted_range:
              arguments: {min_value: 0, max_value: 12}
      - name: median_pace_min_per_mi
        description: >
          1609.344 / (median velocity * 60) — the same monotone
          transformation every pace column in the band chain applies to
          a velocity median. Falling min/mi at the same band = the
          observational improvement signal.
        tests: [not_null]
