version: 2

models:
  - name: fct_runs
    description: >
      One row per Strava running activity (Run/TrailRun/VirtualRun),
      indoor and outdoor alike — the mart- and app-facing core contract
      (Revision v1.2): an explicit-column projection of
      int_run_efficiency carrying the derived training measures, weather
      context, the duration-based long-run flag, and the analytic
      columns (aerobic efficiency, is_valid, exclusion_reason) computed
      upstream, so marts read core only. Missing heart rate and missing
      weather remain NULL end to end — distinguishable from zero.
    columns:
      - name: activity_id
        description: Strava activity id (grain of the table).
        tests: [unique, not_null]
      - name: week_start_date
        description: >
          Monday of the run's local training week (derived from
          start_date_local — a 9 PM Tuesday run belongs to Tuesday even
          when it is already Wednesday in UTC).
        tests: [not_null]
      - name: start_month
        description: Calendar month (1-12) of the local start time.
      - name: start_year
        description: Calendar year of the local start time.
      - name: distance_mi
        description: Distance in miles (meters / 1609.344, 2 dp).
      - name: moving_time_min
        description: Moving time in minutes (1 dp).
      - name: pace_min_per_mi
        description: >
          Pace in minutes per mile; NULL when distance or moving time is
          zero (guarded division, never an error).
        tests:
          - accepted_range:
              arguments: {min_value: 0}
      - name: speed_m_per_min
        description: Speed in meters per minute; NULL when moving time is zero.
        tests:
          - accepted_range:
              arguments: {min_value: 0}
      - name: elevation_gain_m_per_mi
        description: Elevation gain per mile (m/mi); NULL when distance is zero.
      - name: average_hr_bpm
        description: Average heart rate (bpm); NULL when the source has no HR.
      - name: weather_available
        description: >
          True when a qualifying observation within 60 minutes exists at
          the run's D7 cell (int_runs_with_weather.weather_matched).
        tests: [not_null]
      - name: weather_match_minutes
        description: Minutes between run start and the matched observation.
      - name: temperature_c
        description: Matched observation air temperature, °C; NULL when unmatched.
      - name: long_run_eligible
        description: >
          Moving time >= long_run_min_moving_minutes (45, aligned with
          D15's stream threshold so "long run" keeps one meaning in
          Phase 5). Deliberately duration-based, not Strava's manual
          workout_type = 2 tag.
        tests: [not_null]
      - name: fetched_at
        description: Ingestion timestamp carried from the raw layer.
        tests: [not_null]
      - name: aerobic_efficiency_m_per_heartbeat
        description: >
          D10 efficiency (meters per heartbeat), computed in
          int_run_efficiency and projected here unchanged; the
          accepted_range test lives at the computation site.
      - name: is_valid
        description: >
          The run counts toward every efficiency aggregate (D9 revised
          v1.1). Defined upstream as (exclusion_reason is null).
        tests: [not_null]
      - name: exclusion_reason
        description: >
          NULL when valid; otherwise the first failing validity rule.
          The accepted_values test lives at the computation site
          (int_run_efficiency) so the var-rendered strings are
          maintained in one file.

  - name: fct_drift_candidates
    description: >
      One row per drift CANDIDATE (HR-carrying run >= the 45-minute
      long-run threshold, D15 revised v1.1 — intensity is not a
      prerequisite), materialized in core since Revision v1.2 (formerly
      intermediate.int_run_drift_halves): the D16 analysis window
      applied in the plan's order (drop non-moving samples, trim the
      first 10 and last 5 minutes, require >= 30 minutes remaining,
      split into two equal-duration halves), per-half
      HR/speed/efficiency, and the decoupling percentage. Candidates
      that cannot be analyzed carry the FIRST failing check as a
      deterministic exclusion_reason, in dependency order: stream
      availability -> required arrays -> window length -> pauses ->
      coverage. D17 sign convention: POSITIVE decoupling = efficiency
      declined in the second half; near zero = stable; negative = the
      second half improved.
    columns:
      - name: activity_id
        description: Strava activity id (one row per drift candidate).
        tests: [unique, not_null]
      - name: window_duration_s
        description: Analysis-window length after trimming; NULL when streams are absent.
      - name: paused_fraction
        description: Non-moving share of window samples (pause check input).
      - name: avg_sample_gap_s
        description: window_duration_s / valid samples (coverage check input).
      - name: first_half_efficiency
        description: first_half_speed_m_per_min / first_half_hr_bpm (D16).
      - name: second_half_efficiency
        description: second_half_speed_m_per_min / second_half_hr_bpm (D16).
      - name: decoupling_pct
        description: >
          (first_half_efficiency - second_half_efficiency) /
          first_half_efficiency * 100 (D17: positive = second-half
          decline). NULL exactly when exclusion_reason is set.
      - name: exclusion_reason
        description: >
          NULL when the run was analyzed; otherwise the first failing
          D16 check, with thresholds rendered from the same dbt vars
          the checks use.
